services:
  postgres:
    image: postgres:16-alpine
    container_name: projectverse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projectverse
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: projectverse-server
    environment:
      SERVER_PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/projectverse
      JWT_ACCESS_SECRET: replace-with-access-secret-value-min-20
      JWT_REFRESH_SECRET: replace-with-refresh-secret-value-min-20
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - '4000:4000'
    depends_on:
      - postgres

  ai-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-service
    container_name: projectverse-ai-service
    environment:
      AI_SERVICE_PORT: 8000
      AI_DEFAULT_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - '8000:8000'

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: projectverse-client
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
    ports:
      - '5173:5173'
    depends_on:
      - server

volumes:
  postgres_data:
